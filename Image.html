<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="image.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


</head>
<body>
    <div class="slider-container">
        <div class="image-container">
            <li><img src="https://picsum.photos/id/237/500/300" alt=""></li>
            <li><img src="https://picsum.photos/id/1/500/300" alt=""></li>
            <li><img src="https://picsum.photos/id/30/500/300" alt=""></li>
            <li><img src="https://picsum.photos/id/300/500/300" alt=""></li>
            <li><img src="https://picsum.photos/id/400/500/300" alt=""></li>

        </div>
        <i class="fa-solid fa-chevron-left btn prev"></i>
        <i class="fa-solid fa-chevron-right btn next"></i>
        
    </div>  
</body>
</html>
